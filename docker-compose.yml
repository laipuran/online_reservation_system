services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ors
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  migrate:
    image: migrate/migrate
    command:
      -path=/migrations
      -database=postgres://postgres:postgres@db:5432/ors?sslmode=disable
      up
    volumes:
      - ./ors-be/migrations:/migrations
    depends_on:
      db:
        condition: service_healthy
    restart: no

  seed:
    image: postgres:16-alpine
    command:
      - sh
      - -c
      - psql postgres://postgres:postgres@db:5432/ors?sslmode=disable -f /seed.sql
    volumes:
      - ./ors-be/db/seed.sql:/seed.sql
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: no

  backend:
    image: ors-be:latest
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/ors?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      HTTP_PORT: "8080"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
    depends_on:
      seed:
        condition: service_completed_successfully
    restart: unless-stopped

  frontend:
    image: ors-fe:latest
    environment:
      API_BASE_URL: http://backend:8080/api/v1
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
