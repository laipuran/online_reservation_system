info:
  name: create_review
  type: http
  seq: 25

http:
  method: POST
  url: http://localhost:8080/api/v1/reviews
  body:
    type: json
    data: |-
      {
        "reservation_id": 1001,
        "rating": 5,
        "comment": "Service was professional."
      }
  headers:
    - name: Authorization
      value: Bearer {{customer_token}}
      enabled: true
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
