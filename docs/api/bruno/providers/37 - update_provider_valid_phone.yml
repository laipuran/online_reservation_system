info:
  name: update_provider_valid_phone
  type: http
  seq: 37

http:
  method: PUT
  url: http://localhost:8080/api/v1/providers/me
  body:
    type: json
    data: |-
      {
        "business_name": "舒心养生馆",
        "description": "更新后的商家简介",
        "address": "上海市徐汇区",
        "phone": "138 0013-8000",
        "email": "new-shop@example.com",
        "logo_url": "https://example.com/new-logo.png"
      }
  headers:
    - name: Authorization
      value: Bearer {{provider_token}}
      enabled: true
  auth: none

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() !== 200) {
          throw new Error("update_provider_valid_phone expected 200, got " + res.getStatus());
        }
        const body = res.getBody();
        const phone = body && body.data && body.data.phone;
        if (phone !== "138 0013-8000") {
          throw new Error("updated provider phone mismatch: " + phone);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
