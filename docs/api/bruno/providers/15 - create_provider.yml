info:
  name: create_provider
  type: http
  seq: 15

http:
  method: POST
  url: http://localhost:8080/api/v1/providers/me
  headers:
    - name: Authorization
      value: Bearer {{provider_token}}
  body:
    type: json
    data: |-
      {
        "business_name": "舒心养生馆",
        "description": "专业按摩服务",
        "address": "上海市",
        "phone": "13800000000",
        "email": "shop@example.com",
        "logo_url": "https://example.com/logo.png"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
