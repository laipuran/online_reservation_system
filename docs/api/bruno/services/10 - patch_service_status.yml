info:
  name: patch_service_status
  type: http
  seq: 10

http:
  method: PATCH
  url: http://localhost:8080/api/v1/services/{{service_id}}/status
  headers:
    - name: Authorization
      value: Bearer {{provider_token}}
  body:
    type: json
    data: |-
      {
        "status": "active"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
