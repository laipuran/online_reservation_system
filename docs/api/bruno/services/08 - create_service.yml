info:
  name: create_service
  type: http
  seq: 8

http:
  method: POST
  url: http://localhost:8080/api/v1/services
  headers:
    - name: Authorization
      value: Bearer {{provider_token}}
  body:
    type: json
    data: |-
      {
        "category_id": 1,
        "title": "肩颈按摩 60 分钟",
        "description": "缓解肩颈疲劳",
        "price": 199,
        "duration_minutes": 60,
        "image_url": "https://example.com/service.png"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        const serviceId = body && body.data && body.data.id;
        if (serviceId) {
          bru.setEnvVar("service_id", String(serviceId), { persist: true });
          bru.setVar("service_id", String(serviceId));
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
