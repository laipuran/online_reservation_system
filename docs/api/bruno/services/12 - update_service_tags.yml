info:
  name: update_service_tags
  type: http
  seq: 12

http:
  method: PUT
  url: http://localhost:8080/api/v1/services/{{service_id}}/tags
  headers:
    - name: Authorization
      value: Bearer {{provider_token}}
  body:
    type: json
    data: |-
      {
        "tag_ids": [1]
      }

runtime:
  scripts:
    - type: before-request
      code: |-
        const tagId = Number(bru.getVar("tag_id") || bru.getEnvVar("tag_id") || 1);
        const body = req.getBody();
        body.tag_ids = [tagId];
        req.setBody(body);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
