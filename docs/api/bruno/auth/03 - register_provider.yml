info:
  name: register_provider
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:8080/api/v1/auth/register
  body:
    type: json
    data: |-
      {
        "email": "bruno_provider@example.com",
        "password": "123@abc123",
        "name": "Bruno 商户",
        "role": "provider"
      }
  auth: none

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        const token = body && body.data && body.data.access_token;
        if (token) {
          bru.setEnvVar("provider_token", token, { persist: true });
          bru.setVar("provider_token", token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
