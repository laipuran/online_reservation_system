info:
  name: create_tag
  type: http
  seq: 35

http:
  method: POST
  url: http://localhost:8080/api/v1/tags
  headers:
    - name: Authorization
      value: Bearer {{provider_token}}
  body:
    type: json
    data: |-
      {
        "name": "放松"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        const tagId = body && body.data && body.data.id;
        if (tagId) {
          bru.setEnvVar("tag_id", String(tagId), { persist: true });
          bru.setVar("tag_id", String(tagId));
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
