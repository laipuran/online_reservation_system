info:
  name: get_user_public
  type: http
  seq: 7

http:
  method: GET
  url: http://localhost:8080/api/v1/users/{{customer_user_id}}
  auth: none

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() !== 200) {
          throw new Error("get_user_public expected 200, got " + res.getStatus());
        }
        const body = res.getBody();
        const data = body && body.data;
        if (!data || !data.id || !data.name || !data.created_at) {
          throw new Error("public user response is missing required fields");
        }
        for (const field of ["email", "role", "phone", "password_hash", "updated_at"]) {
          if (Object.prototype.hasOwnProperty.call(data, field)) {
            throw new Error("public user response must not contain " + field);
          }
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
