info:
  name: get_user_public_not_found
  type: http
  seq: 8

http:
  method: GET
  url: http://localhost:8080/api/v1/users/999999999
  auth: none

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() !== 404) {
          throw new Error("get_user_public_not_found expected 404, got " + res.getStatus());
        }
        const body = res.getBody();
        if (!body || body.message !== "用户不存在") {
          throw new Error("unexpected not found message: " + (body && body.message));
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
