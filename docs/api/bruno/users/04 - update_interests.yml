info:
  name: update_interests
  type: http
  seq: 4

http:
  method: PUT
  url: http://localhost:8080/api/v1/users/me/interests
  body:
    type: json
    data: |-
      {
        "tag_ids": [1, 2, 3]
      }
  headers:
    - name: Authorization
      value: Bearer {{customer_token}}
      enabled: true
  auth: none

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
