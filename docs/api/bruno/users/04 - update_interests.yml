info:
  name: update_interests
  type: http
  seq: 4

http:
  method: PUT
  url: http://localhost:8080/api/v1/users/me/interests
  body:
    type: json
    data: |-
      {
        "tag_ids": [1]
      }
  headers:
    - name: Authorization
      value: Bearer {{customer_token}}
      enabled: true
  auth: none

runtime:
  scripts:
    - type: before-request
      code: |-
        const tagId = Number(bru.getVar("tag_id") || bru.getEnvVar("tag_id") || 1);
        const body = req.getBody();
        body.tag_ids = [tagId];
        req.setBody(body);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
