info:
  name: create_reservation_past_date
  type: http
  seq: 39

http:
  method: POST
  url: http://localhost:8080/api/v1/reservations
  body:
    type: json
    data: |-
      {
        "service_id": 1,
        "start_time": "2026-07-10T14:00:00Z",
        "note": "过去日期边界测试"
      }
  headers:
    - name: Authorization
      value: Bearer {{customer_token}}
      enabled: true
  auth: none

runtime:
  scripts:
    - type: before-request
      code: |-
        const serviceId = Number(bru.getVar("service_id") || bru.getEnvVar("service_id") || 1);
        const start = new Date(Date.now() - 24 * 60 * 60 * 1000);
        start.setUTCSeconds(0, 0);
        const body = req.getBody();
        body.service_id = serviceId;
        body.start_time = start.toISOString();
        req.setBody(body);
    - type: after-response
      code: |-
        if (res.getStatus() !== 400) {
          throw new Error("create_reservation_past_date expected 400, got " + res.getStatus());
        }
        const body = res.getBody();
        if (!body || body.message !== "预约参数无效") {
          throw new Error("unexpected reservation invalid input message: " + (body && body.message));
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
