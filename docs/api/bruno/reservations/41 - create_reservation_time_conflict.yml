info:
  name: create_reservation_time_conflict
  type: http
  seq: 41

http:
  method: POST
  url: http://localhost:8080/api/v1/reservations
  body:
    type: json
    data: |-
      {
        "service_id": 1,
        "start_time": "2026-07-10T14:00:00Z",
        "note": "重叠预约边界测试"
      }
  headers:
    - name: Authorization
      value: Bearer {{customer_token}}
      enabled: true
  auth: none

runtime:
  scripts:
    - type: before-request
      code: |-
        const customerToken = bru.getVar("customer_token") || bru.getEnvVar("customer_token");
        const serviceId = Number(bru.getVar("service_id") || bru.getEnvVar("service_id") || 1);
        if (!customerToken) {
          throw new Error("customer_token is required to create conflict reservation");
        }

        const day = 24 * 60 * 60 * 1000;
        const baseStart = new Date(Date.now() + 75 * day + Math.floor(Math.random() * 10 * day));
        baseStart.setUTCSeconds(0, 0);

        const createRes = await bru.sendRequest({
          method: "POST",
          url: "http://localhost:8080/api/v1/reservations",
          headers: {
            Authorization: "Bearer " + customerToken,
            "Content-Type": "application/json"
          },
          data: {
            service_id: serviceId,
            start_time: baseStart.toISOString(),
            note: "用于重叠冲突边界测试的基准预约"
          }
        });
        if (createRes.status !== 201) {
          throw new Error("create base reservation expected 201, got " + createRes.status);
        }

        const data = createRes.data && createRes.data.data;
        const start = new Date(data.start_time).getTime();
        const end = new Date(data.end_time).getTime();
        const overlapStart = new Date(start + Math.floor((end - start) / 2));
        overlapStart.setUTCSeconds(0, 0);

        const body = req.getBody();
        body.service_id = serviceId;
        body.start_time = overlapStart.toISOString();
        req.setBody(body);
    - type: after-response
      code: |-
        if (res.getStatus() !== 409) {
          throw new Error("create_reservation_time_conflict expected 409, got " + res.getStatus());
        }
        const body = res.getBody();
        if (!body || body.message !== "该时段已被预约") {
          throw new Error("unexpected time conflict message: " + (body && body.message));
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
