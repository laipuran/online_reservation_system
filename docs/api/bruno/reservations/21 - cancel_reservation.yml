info:
  name: cancel_reservation
  type: http
  seq: 21

http:
  method: PUT
  url: http://localhost:8080/api/v1/reservations/{{reservation_id}}/cancel
  headers:
    - name: Authorization
      value: Bearer {{customer_token}}
      enabled: true
  auth: none

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.getStatus() !== 200) {
          throw new Error("cancel_reservation expected 200, got " + res.getStatus());
        }

        const providerToken = bru.getVar("provider_token") || bru.getEnvVar("provider_token");
        if (!providerToken) {
          throw new Error("provider_token is required to verify cancellation notification");
        }

        const notificationRes = await bru.sendRequest({
          method: "GET",
          url: "http://localhost:8080/api/v1/notifications?is_read=false&page=1&page_size=20",
          headers: {
            Authorization: "Bearer " + providerToken
          }
        });
        if (notificationRes.status !== 200) {
          throw new Error("provider notification list expected 200, got " + notificationRes.status);
        }

        const items = notificationRes.data && notificationRes.data.data && notificationRes.data.data.items;
        const notification = items && items[0];
        if (!notification || notification.type !== "reservation_cancelled") {
          throw new Error("reservation_cancelled notification was not created for provider");
        }
        bru.setEnvVar("provider_notification_id", String(notification.id), { persist: true });
        bru.setVar("provider_notification_id", String(notification.id));

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
