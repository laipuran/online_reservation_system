info:
  name: create_reservation
  type: http
  seq: 18

http:
  method: POST
  url: http://localhost:8080/api/v1/reservations
  body:
    type: json
    data: |-
      {
        "service_id": 1,
        "start_time": "2026-07-10T14:00:00Z",
        "note": "请准备热水"
      }
  headers:
    - name: Authorization
      value: Bearer {{customer_token}}
      enabled: true
  auth: none

runtime:
  scripts:
    - type: before-request
      code: |-
        const serviceId = Number(bru.getVar("service_id") || bru.getEnvVar("service_id") || 1);
        const day = 24 * 60 * 60 * 1000;
        const randomOffset = Math.floor(Math.random() * 365 * day);
        const start = new Date(Date.now() + 30 * day + randomOffset);
        start.setUTCSeconds(0, 0);
        const body = req.getBody();
        body.service_id = serviceId;
        body.start_time = start.toISOString();
        req.setBody(body);
        bru.setVar("reservation_start_time", body.start_time);
    - type: after-response
      code: |-
        const body = res.getBody();
        const reservationId = body && body.data && body.data.id;
        if (reservationId) {
          bru.setEnvVar("reservation_id", String(reservationId), { persist: true });
          bru.setVar("reservation_id", String(reservationId));
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
